<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Grape+Nuts&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@200;300;400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="main-cont">
        <h1 id="header">Tic Tac Toe</h1>
        <div id="myForm">
            <h2>Enter Your Name: </h2>
            <form>
                <input id="userName" type="text" placeholder="John Smith">
                <h2 id="markh2">Select Your Mark:</h2>
                <div id="radioBtnsdiv">
                    <input class="radioBtns" type="radio" id="markX" name="userMark">
                    <label for="markX">X</label>
                    <input class="radioBtns" type="radio" id="markO" name="userMark">
                    <label for="markO">O</label>
                </div>
                <button id="startBtn">Start Game</button>

            </form>
        </div>
        <div id="board-cont"></div>
    </div>

    <script src="./app.js"></script>
</body>

</html>
